apiVersion: 1

# Auto-provision Prometheus, Jaeger, and Elasticsearch as Grafana datasources.
# No manual setup needed — these are available immediately on first boot.

datasources:

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: jaeger

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: elasticsearch
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: true
    jsonData:
      index: transform-platform-logs
      timeField: "@timestamp"
      logMessageField: message
      logLevelField: level
