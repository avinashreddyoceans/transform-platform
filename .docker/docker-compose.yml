version: '3.9'

# Local infrastructure for transform-platform development.
# Usage: docker compose -f .docker/docker-compose.yml up -d
#
# Services:  PostgreSQL 16 · Kafka (Confluent 7.6) · Zookeeper · Kafka UI
#            OTel Collector · Jaeger · Prometheus · Grafana · Elasticsearch · Kibana
#
# Ports:
#   Postgres       → 5432
#   Kafka          → 9092  |  Kafka UI  → 8090
#   MinIO          → 9000 (API / SDK), 9001 (console UI)
#   OTel Collector → 4317 (gRPC), 4318 (HTTP), 8889 (metrics)
#   Jaeger         → 16686 (UI)
#   Prometheus     → 9090
#   Grafana        → 3001  (admin / admin)  ← 3000 reserved for Docusaurus dev server
#   Elasticsearch  → 9200
#   Kibana         → 5601

services:

  # ── Data Layer ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: transform-postgres
    environment:
      POSTGRES_DB: transform_platform
      POSTGRES_USER: transform_user
      POSTGRES_PASSWORD: transform_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transform_user -d transform_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Messaging ─────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: transform-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: transform-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: transform-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: unless-stopped

  # ── Object Storage ────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: transform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3-compatible API (SDK / app)
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Observability Stack ───────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: transform-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
      # No log-file bind-mount needed — app pushes all signals via OTLP HTTP (:4318).
    ports:
      - "4317:4317"   # OTLP gRPC  (available but not used by the app)
      - "4318:4318"   # OTLP HTTP  (app sends traces + metrics + logs here)
      - "8889:8889"   # Prometheus metrics exporter (scraped by Prometheus)
      - "13133:13133" # Health check
    depends_on:
      jaeger:
        condition: service_started
      elasticsearch:
        condition: service_healthy   # wait for ES to be ready before starting pipelines
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: transform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: 50000
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC receiver (from OTel Collector)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: transform-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: transform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"   # 3000 is reserved for the Docusaurus dev server (website/)
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    container_name: transform-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=transform-local
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.2
    container_name: transform-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # One-shot container: waits for Kibana then creates the data view for logs.
  # Runs once on stack startup — safe to re-run (creation is idempotent).
  kibana-setup:
    image: curlimages/curl:8.6.0
    container_name: transform-kibana-setup
    depends_on:
      kibana:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c '
        echo "Creating Kibana data view: transform-platform-logs*";
        curl -sf -X POST http://kibana:5601/api/data_views/data_view \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d "{\"data_view\":{\"title\":\"transform-platform-logs*\",\"name\":\"Transform Platform Logs\",\"timeFieldName\":\"@timestamp\"}}" \
        && echo "Data view created successfully." \
        || echo "Data view may already exist — skipping.";
      '

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
