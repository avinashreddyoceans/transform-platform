# OpenTelemetry Collector configuration for Transform Platform local dev
#
# Signal routing:
#   Traces  → Jaeger         (gRPC :14250)
#   Metrics → Prometheus     (pull, exposed on :8889)
#   Logs    → Elasticsearch  (:9200)
#
# The app pushes ALL signals (traces, metrics, logs) via OTLP HTTP/protobuf to :4318.
# Driven entirely by otel.* properties in application.yml — no code config required.
# The Log4j2 OpenTelemetryAppender is installed automatically by the OTel Spring Boot starter.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

processors:
  # Batch telemetry for efficiency — reduces network round-trips
  batch:
    send_batch_size: 1000
    timeout: 10s

  # Add resource attributes present on all signals
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

  # Drop high-cardinality attributes that bloat storage
  attributes/sanitize:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.response.header.set-cookie
        action: delete

exporters:
  # ── Traces → Jaeger ──────────────────────────────────────────────────────────
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # ── Metrics → Prometheus (pull model — Prometheus scrapes :8889) ─────────────
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: transform
    const_labels:
      source: otel_collector

  # ── Logs → Elasticsearch ─────────────────────────────────────────────────────
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: transform-platform-logs
    # Retry on transient ES failures
    retry:
      enabled: true
      initial_interval: 1s
      max_interval: 30s

  # ── Debug: print to collector stdout (useful when debugging locally) ──────────
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 100

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [resource, attributes/sanitize, batch]
      exporters:  [otlp/jaeger]

    metrics:
      receivers:  [otlp]
      processors: [resource, batch]
      exporters:  [prometheus]

    logs:
      receivers:  [otlp]                          # pushed via HTTP/protobuf by Log4j2 OTel appender
      processors: [resource, attributes/sanitize, batch]
      exporters:  [elasticsearch, debug]
