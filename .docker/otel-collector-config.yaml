# OpenTelemetry Collector configuration for Transform Platform local dev
#
# Signal routing:
#   Traces  → Jaeger  (gRPC :14250)
#   Metrics → Prometheus (exposed on :8889 for scraping)
#   Logs    → Elasticsearch (:9200)
#
# The app sends all signals via OTLP to this collector on :4317 (gRPC) / :4318 (HTTP).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

  # Tail the app's JSON log file written by Logback/LogstashEncoder.
  # The app runs on the host and writes to platform-api/logs/; that directory
  # is bind-mounted into this container at /var/log/app (see docker-compose.yml).
  filelog:
    include: [/var/log/app/transform-platform.log]
    start_at: beginning
    include_file_path: false
    operators:
      # Parse each line as JSON
      - type: json_parser
        parse_from: body
        timestamp:
          parse_from: attributes.timestamp
          layout_type: gotime
          layout: "2006-01-02T15:04:05.000000-07:00"
        severity:
          parse_from: attributes.level
          preset: default   # maps INFO/WARN/ERROR/DEBUG case-insensitively
      # Promote the message text to the log body
      - type: move
        from: attributes.message
        to: body
      # Carry useful MDC fields as standard OTel attributes
      - type: move
        from: attributes.traceId
        to: attributes["traceId"]
        if: 'attributes["traceId"] != nil'
      - type: move
        from: attributes.correlationId
        to: attributes["correlationId"]
        if: 'attributes["correlationId"] != nil'
      - type: move
        from: attributes.logger_name
        to: attributes["logger.name"]
        if: 'attributes["logger_name"] != nil'
      - type: move
        from: attributes.thread_name
        to: attributes["thread.name"]
        if: 'attributes["thread_name"] != nil'

processors:
  # Batch telemetry for efficiency — reduces network round-trips
  batch:
    send_batch_size: 1000
    timeout: 10s

  # Add resource attributes present on all signals
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

  # Drop high-cardinality attributes that bloat storage
  attributes/sanitize:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.response.header.set-cookie
        action: delete

exporters:
  # ── Traces → Jaeger ──────────────────────────────────────────────────────────
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # ── Metrics → Prometheus (pull model — Prometheus scrapes :8889) ─────────────
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: transform
    const_labels:
      source: otel_collector

  # ── Logs → Elasticsearch ─────────────────────────────────────────────────────
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: transform-platform-logs
    # Retry on transient ES failures
    retry:
      enabled: true
      initial_interval: 1s
      max_interval: 30s

  # ── Debug: print to collector stdout (useful when debugging locally) ──────────
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 100

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [resource, attributes/sanitize, batch]
      exporters:  [otlp/jaeger]

    metrics:
      receivers:  [otlp]
      processors: [resource, batch]
      exporters:  [prometheus]

    logs:
      receivers:  [filelog]           # tails platform-api/logs/transform-platform.log
      processors: [resource, batch]   # no sanitize needed — filelog doesn't capture auth headers
      exporters:  [elasticsearch]
