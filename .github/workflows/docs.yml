name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy Docusaurus → /docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log works in config

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build Docusaurus
        run: npm run build
        working-directory: website

      - name: Replace /docs with built output
        run: |
          rm -rf docs
          cp -r website/build docs
          # Remove SSR bundle — not needed for static GitHub Pages hosting
          rm -rf docs/__server
          # Ensure Jekyll doesn't interfere with GitHub Pages
          touch docs/.nojekyll

      - name: Commit and push /docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No doc changes." || (
            git commit -m "docs: rebuild Docusaurus site [skip ci]"
            git push
          )
