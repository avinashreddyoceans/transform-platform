name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write   # peaceiris/actions-gh-pages needs this to push to gh-pages branch

jobs:
  build-and-deploy:
    name: Build & Deploy Docusaurus → gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build Docusaurus
        run: npm run build
        working-directory: website

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
          # Prevents Jekyll processing — required for Docusaurus
          enable_jekyll: false
          # Keeps git history lean — force-pushes the branch each time
          force_orphan: true
          commit_message: "docs: deploy ${{ github.sha }}"
