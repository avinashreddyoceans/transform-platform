name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read        # checkout
  checks: write         # dorny/test-reporter needs this to create check runs
  pull-requests: write  # allows test-reporter to annotate PRs

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build all modules
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Publish Kotest results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Kotest Test Results
          # Kotest emits JUnit-compatible XML when run via Gradle — java-junit is correct
          path: '**/build/test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: |
            platform-api/build/libs/*.jar
          retention-days: 7
