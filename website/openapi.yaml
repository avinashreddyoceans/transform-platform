  /api/v1/credentials:
    get:
      tags: [Credentials]
      operationId: listCredentials
      summary: List credentials
      description: "🚧 *Coming Soon* — Returns all stored credentials (values are always masked)."
      parameters:
        - name: type
          in: query
          required: false
          description: Filter by credential type
          schema:
            $ref: '#/components/schemas/CredentialType'
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          required: false
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: List of credentials (values masked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CredentialResponse'
        "501":
          description: Not yet implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Credentials]
      operationId: storeCredential
      summary: Store a credential
      description: |
        🚧 *Coming Soon* — Store a new credential securely.

        The credential value is encrypted at rest using AES-256-GCM and is **never
        returned** after this call. Only the credential ID and metadata are accessible
        via subsequent GET requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialRequest'
            examples:
              ssh_key:
                summary: SSH private key
                value:
                  name: acme-sftp-key
                  credentialType: SSH_KEY
                  username: sftp-user
                  privateKey: "-----BEGIN RSA PRIVATE KEY-----\n..."
              password:
                summary: Username / password
                value:
                  name: acme-ftp-pass
                  credentialType: PASSWORD
                  username: ftp-user
                  password: "s3cr3t!"
              aws:
                summary: AWS access key
                value:
                  name: acme-s3-key
                  credentialType: AWS_ACCESS_KEY
                  accessKeyId: AKIAIOSFODNN7EXAMPLE
                  secretAccessKey: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      responses:
        "201":
          description: Credential stored (value not returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        "501":
          description: Not yet implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

